function dayOffset(d){ return d ? Math.max(0, Math.round((new Date(d) - TIMELINE_START) / 86400000)) : null; }

/* ── Editable date input ── */
function DateEditor({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [startVal, setStartVal] = useState('');
  const [endVal, setEndVal] = useState('');

  const openEditor = () => {
    setStartVal(value.dateStart || '');
    setEndVal(value.dateEnd || '');
    setEditing(true);
  };

  const save = () => {
    const fmt = (iso) => {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      const day = d.getDate();
      const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
      return `${day} ${months[d.getMonth()]}`;
    };
    const label = startVal && endVal && startVal !== endVal
      ? `${fmt(startVal)} — ${fmt(endVal)}`
      : startVal ? fmt(startVal) : 'TBC';
    onChange({ date: label, dateStart: startVal || null, dateEnd: endVal || null });
    setEditing(false);
  };

  if (editing) {
    return (
      <div style={{
        display:'flex', gap:3, alignItems:'center', flexWrap:'wrap',
        padding:'3px 0',
      }}>
        <input type="date" value={startVal} onChange={e=>setStartVal(e.target.value)}
          style={{ fontSize:10, fontFamily:'var(--font)', fontWeight:600, padding:'2px 4px',
            border:'1.5px solid var(--blueberry-800)', borderRadius:4, width:110,
            background:'var(--blueberry-50)', color:'var(--blueberry-1000)' }} />
        <span style={{ fontSize:10, color:'var(--n400)' }}>to</span>
        <input type="date" value={endVal} onChange={e=>setEndVal(e.target.value)}
          style={{ fontSize:10, fontFamily:'var(--font)', fontWeight:600, padding:'2px 4px',
            border:'1.5px solid var(--blueberry-800)', borderRadius:4, width:110,
            background:'var(--blueberry-50)', color:'var(--blueberry-1000)' }} />
        <button onClick={save} style={{
          fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:4,
          border:'none', background:'var(--bk)', color:'var(--wh)',
          cursor:'pointer', fontFamily:'var(--font)',
        }}>OK</button>
        <button onClick={()=>setEditing(false)} style={{
          fontSize:10, fontWeight:600, padding:'2px 6px', borderRadius:4,
          border:'1px solid var(--n300)', background:'var(--wh)', color:'var(--n500)',
          cursor:'pointer', fontFamily:'var(--font)',
        }}>Cancel</button>
      </div>
    );
  }

  const isTbc = !value.dateStart;
  return (
    <span onClick={openEditor} title="Click to set date" style={{
      fontSize:10, fontWeight:600, padding:'1px 6px', borderRadius:4,
      background: isTbc ? 'var(--blueberry-50)' : 'var(--n50)',
      color: isTbc ? 'var(--blueberry-900)' : 'var(--n600)',
      fontStyle: isTbc ? 'italic' : 'normal',
      cursor:'pointer', border: isTbc ? '1px dashed var(--blueberry-800)' : '1px solid transparent',
      transition:'all .12s',
    }}>
      {value.date}{isTbc ? ' (click to set)' : ''}
    </span>
  );
}

}

                  </div>
                  <div style={{ fontSize:10, color:`var(${s.color})`, opacity:0.5, marginTop:3, lineHeight:1.3, fontStyle:'italic' }}>
                    {s.goal}
                  </div>
                </div>
              </div>
              {i < stageData.length-1 && (
                <div style={{ display:'flex', alignItems:'center', flexShrink:0, width:16, color:'var(--n300)', fontSize:16, fontWeight:300 }}>›</div>
              )}
            </React.Fragment>
          ))}
        </div>

        {/* Channel cards per stage */}
        <div style={{ display:'flex', gap:6, alignItems:'flex-start', minWidth:1100 }}>
          {stageData.map((stage,i) => (
            <React.Fragment key={stage.id}>
              <div style={{ flex:1, minWidth:200, display:'flex', flexDirection:'column', gap:6 }}>
                {Object.entries(stage.byChannel).map(([ch, tps]) => {
                  const cfg = CHANNELS[ch] || { icon:'📋', color:'--n600', bg:'--n50', border:'--n200' };
                  return (
                    <div key={ch} style={{
                      borderRadius:10, overflow:'hidden',
                      border:`1px solid var(${cfg.border})`, background:'var(--wh)',
                    }}>
                      <div style={{
                        background:`var(${cfg.bg})`, padding:'6px 11px',
                        display:'flex', alignItems:'center', gap:5,
                        borderBottom:`1px solid var(${cfg.border})`,
                      }}>
                        <span style={{ fontSize:12 }}>{cfg.icon}</span>
                        <span style={{ fontSize:11, fontWeight:700, color:`var(${cfg.color})`, letterSpacing:'0.2px' }}>{ch}</span>
                      </div>
                      <div style={{ padding:4, display:'flex', flexDirection:'column', gap:3 }}>
                        {tps.map((tp,j) => {
                          const isHovered = hoveredTp === tp._id;
                          return (
                            <div key={tp._id}
                              onMouseEnter={()=>setHoveredTp(tp._id)}
                              onMouseLeave={()=>setHoveredTp(null)}
                              style={{
                                padding:'7px 9px', borderRadius:6, cursor:'default',
                                border: tp.status==='confirmed' ? '1px solid var(--n200)' : '1px dashed var(--n300)',
                                background: isHovered ? 'var(--n50)' : tp.status==='confirmed' ? 'var(--n25)' : 'var(--wh)',
                                transition:'background .12s',
                              }}>
                              <div style={{ fontSize:12, fontWeight:600, lineHeight:1.3, color:'var(--bk)', marginBottom:4 }}>
                                {tp.name}
                              </div>
                              <div style={{ display:'flex', gap:4, flexWrap:'wrap', alignItems:'center' }}>
                                <span style={{
                                  fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:4,
                                  background:`var(${audienceBg[tp.audience]})`,
                                  color:`var(${audienceColor[tp.audience]})`,
                                }}>
                                  {audienceLabel[tp.audience]}
                                </span>
                                <StatusToggle status={tp.status}
                                  onToggle={()=>updateTp(tp._id, { status: tp.status==='tbc'?'confirmed':'tbc' })} />
                                <DateEditor
                                  value={{ date:tp.date, dateStart:tp.dateStart, dateEnd:tp.dateEnd }}
                                  onChange={(patch)=>updateTp(tp._id, patch)} />
                              </div>
                              {tp.markets && (
                                <div style={{ fontSize:10, color:'var(--n400)', marginTop:3 }}>{tp.markets}</div>
                              )}
                              {isHovered && tp.objective && (
                                <div style={{
                                  marginTop:5, padding:'5px 8px', borderRadius:5,
                                  background:'var(--n50)', border:'1px solid var(--n100)',
                                  fontSize:11, color:'var(--n600)', lineHeight:1.35,
                                }}>
                                  <strong style={{ color:'var(--bk)' }}>Objective:</strong> {tp.objective}
                                  {tp.message && <><br/><strong style={{ color:'var(--bk)' }}>Key message:</strong> {tp.message}</>}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                {stage.total === 0 && (
                  <div style={{
                    padding:20, textAlign:'center',
                    border:'1.5px dashed var(--n200)', borderRadius:10,
                    color:'var(--n400)', fontSize:12,
                  }}>
                    No touchpoints{filter !== 'all' ? ` for ${filter}s` : ''}
                  </div>
                )}
              </div>
              {i < stageData.length-1 && <div style={{ width:16, flexShrink:0 }} />}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* ── Timeline by channel ── */}
      <div style={{ maxWidth:1680, margin:'16px auto 0' }}>
        <div style={{
          padding:'16px 18px', borderRadius:10,
          background:'var(--wh)', border:'1px solid var(--n100)',
        }}>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--n500)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:12 }}>
            Timeline by channel
          </div>

          {/* Gantt-style table */}
          <div style={{ display:'grid', gridTemplateColumns:'160px 1fr', gap:0 }}>

            {/* Column headers: channel label + month grid */}
            <div style={{ borderBottom:'1px solid var(--n200)', paddingBottom:6, marginBottom:2 }}>
              <span style={{ fontSize:10, fontWeight:700, color:'var(--n400)' }}>CHANNEL</span>
            </div>
            <div style={{ display:'flex', borderBottom:'1px solid var(--n200)', paddingBottom:6, marginBottom:2 }}>
              {[
                { label:'Mai', weeks:['5','12','19','26'] },
                { label:'Juin', weeks:['2','9','16','23','30'] },
                { label:'Juil', weeks:['7','14','21','28'] },
                { label:'Août', weeks:['4','11'] },
              ].map((m,mi) => (
                <div key={m.label} style={{
                  flex:m.label==='Juin'?5:(m.label==='Août'?2:4),
                  display:'flex', flexDirection:'column', alignItems:'center',
                  borderLeft: mi>0 ? '1px solid var(--n200)' : 'none',
                }}>
                  <span style={{ fontSize:11, fontWeight:700, color:'var(--bk)' }}>{m.label}</span>
                  <div style={{ display:'flex', gap:0, width:'100%', justifyContent:'space-around', marginTop:2 }}>
                    {m.weeks.map(w => (
                      <span key={w} style={{ fontSize:9, color:'var(--n400)', fontWeight:500 }}>{w}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Channel rows */}
            {(() => {
              const CHANNEL_ORDER = ['Sales/CSD','In-product','CRM / Email','Paid Ads','Website','SEO','Social','Community'];
              const totalDays = 122; // Apr 15 → Aug 15
              const pct = (d) => {
                if (!d) return null;
                const diff = Math.round((new Date(d) - new Date('2026-04-15')) / 86400000);
                return Math.max(0, Math.min(100, (diff / totalDays) * 100));
              };

              return CHANNEL_ORDER.filter(ch => filtered.some(t=>t.channel===ch)).map(ch => {
                const cfg = CHANNELS[ch] || { icon:'📋', color:'--n600', bg:'--n50', border:'--n200' };
                const chTps = filtered.filter(t=>t.channel===ch);
                const dated = chTps.filter(t=>t.dateStart);
                const undated = chTps.filter(t=>!t.dateStart);
                const rowHeight = Math.max(dated.length, 1) * 32 + (undated.length > 0 ? 22 : 0) + 8;

                return (
                  <React.Fragment key={ch}>
                    {/* Channel label */}
                    <div style={{
                      display:'flex', alignItems:'flex-start', gap:5, paddingTop:8,
                      borderBottom:'1px solid var(--n100)', paddingBottom:8,
                      minHeight: rowHeight,
                    }}>
                      <span style={{ fontSize:13 }}>{cfg.icon}</span>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:`var(${cfg.color})` }}>{ch}</div>
                        <div style={{ fontSize:10, color:'var(--n400)' }}>{chTps.length} TP{chTps.length>1?'s':''}</div>
                      </div>
                    </div>

                    {/* Bars area */}
                    <div style={{
                      position:'relative', borderBottom:'1px solid var(--n100)',
                      minHeight: rowHeight, paddingTop:6,
                      backgroundImage:'linear-gradient(90deg, var(--n100) 1px, transparent 1px)',
                      backgroundSize:`${100/4}% 100%`,
                      backgroundPosition:'left top',
                    }}>
                      {/* Month dividers */}
                      {[16, 47, 78].map(d => (
                        <div key={d} style={{
                          position:'absolute', left:`${(d/totalDays)*100}%`, top:0, bottom:0,
                          borderLeft:'1px solid var(--n200)',
                        }} />
                      ))}

                      {/* Dated bars */}
                      {dated.map((tp, idx) => {
                        const left = pct(tp.dateStart);
                        const endPct = pct(tp.dateEnd || tp.dateStart);
                        const barWidth = Math.max(endPct - left + (0.8/totalDays*100), 2.5);
                        const stageObj = STAGES.find(s=>s.id===tp.stage);
                        const sb = statusBadge(tp.status);
                        return (
                          <div key={idx} style={{
                            position:'absolute', top: idx * 32 + 4,
                            left:`${left}%`, width:`${barWidth}%`, minWidth:'max-content',
                            height:28, borderRadius:5,
                            background:`var(${stageObj?.bgColor || '--n100'})`,
                            border: tp.status==='confirmed'
                              ? `1.5px solid var(${stageObj?.color || '--n400'})`
                              : `1.5px dashed var(${stageObj?.color || '--n400'})`,
                            display:'flex', alignItems:'center', gap:4, paddingLeft:6, paddingRight:4,
                            zIndex:2,
                          }}>
                            <span style={{
                              width:6, height:6, borderRadius:6, flexShrink:0,
                              background: sb.dot,
                            }} />
                            <span style={{
                              fontSize:11, fontWeight:700,
                              color:`var(${stageObj?.color || '--n600'})`,
                              flex:1,
                            }}>{tp.name}</span>
                            <span style={{
                              fontSize:9, fontWeight:600, color:`var(${stageObj?.color || '--n600'})`,
                              opacity:0.7, whiteSpace:'nowrap', flexShrink:0,
                            }}>{tp.date}</span>
                          </div>
                        );
                      })}

                      {/* Undated (TBC) items */}
                      {undated.length > 0 && (
                        <div style={{
                          position:'absolute', bottom:4, left:4, right:4,
                          display:'flex', gap:4, flexWrap:'wrap',
                        }}>
                          {undated.map((tp, idx) => (
                            <span key={idx} style={{
                              fontSize:10, fontWeight:600, padding:'2px 8px', borderRadius:4,
                              background:'var(--n50)', border:'1px dashed var(--n300)',
                              color:'var(--blueberry-900)', fontStyle:'italic',
                            }}>
                              {tp.name} — TBC
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  </React.Fragment>
                );
              });
            })()}
          </div>

          {/* Legend */}
          <div style={{ display:'flex', gap:16, marginTop:12, alignItems:'center', flexWrap:'wrap' }}>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <div style={{ width:24, height:10, borderRadius:3, background:'var(--blueberry-50)', border:'1.5px solid var(--blueberry-1000)' }} />
              <span style={{ fontSize:10, color:'var(--n500)', fontWeight:600 }}>Confirmed</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
              <div style={{ width:24, height:10, borderRadius:3, background:'var(--peach-50)', border:'1.5px dashed var(--peach-1000)' }} />
              <span style={{ fontSize:10, color:'var(--n500)', fontWeight:600 }}>TBC</span>
            </div>
            <div style={{ width:1, height:14, background:'var(--n200)' }} />
            {STAGES.map(s => (
              <div key={s.id} style={{ display:'flex', alignItems:'center', gap:3 }}>
                <div style={{ width:8, height:8, borderRadius:2, background:`var(${s.bgColor})`, border:`1px solid var(${s.color})` }} />
                <span style={{ fontSize:10, color:'var(--n500)', fontWeight:600 }}>{s.name}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Summary cards ── */}
      <div style={{
        maxWidth:1680, margin:'12px auto 0',
        display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:8,
      }}>
        {['prospect','client'].map(aud => {
          const count = touchpoints.filter(t=>t.audience===aud).length;
          const conf = touchpoints.filter(t=>t.audience===aud && t.status==='confirmed').length;
          return (
            <div key={aud} style={{
              padding:'11px 14px', borderRadius:10,
              background:'var(--wh)', border:'1px solid var(--n100)',
            }}>
              <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:`var(${audienceColor[aud]})`, marginBottom:3 }}>
                {audienceLabel[aud]} journey
              </div>
              <div style={{ fontSize:20, fontWeight:800, color:'var(--bk)' }}>{count}</div>
              <div style={{ fontSize:11, color:'var(--n500)' }}>
                {conf} confirmed &middot; {count - conf} TBC
              </div>
            </div>
          );
        })}
        <div style={{ padding:'11px 14px', borderRadius:10, background:'var(--wh)', border:'1px solid var(--n100)' }}>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:'var(--n500)', marginBottom:3 }}>
            Channels active
          </div>
          <div style={{ fontSize:20, fontWeight:800, color:'var(--bk)' }}>
            {Object.keys(CHANNELS).filter(ch => touchpoints.some(t=>t.channel===ch)).length}
          </div>
          <div style={{ fontSize:11, color:'var(--n500)' }}>across {STAGES.length} stages</div>
        </div>
        <div style={{ padding:'11px 14px', borderRadius:10, background:'var(--wh)', border:'1px solid var(--n100)' }}>
          <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.4px', color:'var(--n500)', marginBottom:3 }}>
            Readiness
          </div>
          <div style={{ fontSize:20, fontWeight:800, color:'var(--bk)' }}>
            {Math.round((touchpoints.filter(t=>t.status==='confirmed').length / touchpoints.length) * 100)}%
          </div>
          <div style={{ fontSize:11, color:'var(--n500)' }}>touchpoints confirmed</div>
        </div>
      </div>

      {/* ── Messaging + Guardrails ── */}
      <div style={{
        maxWidth:1680, margin:'12px auto 0',
        display:'grid', gridTemplateColumns:'1fr 1fr', gap:8,
      }}>
        <div style={{
          padding:'11px 14px', borderRadius:10,
          background:'var(--wh)', borderLeft:'3px solid var(--bk)',
        }}>
          <div style={{ fontSize:10, fontWeight:700, color:'var(--n500)', textTransform:'uppercase', letterSpacing:'0.4px', marginBottom:2 }}>
            Messaging angle
          </div>
          <div style={{ fontSize:13, color:'var(--bk)', fontWeight:600 }}>
            Your card spend, rewarded — effortless cashback on every transaction
          </div>
        </div>
        <div style={{
          padding:'11px 14px', borderRadius:10,
          background:'var(--peach-50)', borderLeft:'3px solid var(--peach-900)',
        }}>
          <div style={{ fontSize:10, fontWeight:700, color:'var(--peach-1000)', textTransform:'uppercase', letterSpacing:'0.4px', marginBottom:2 }}>
            Guardrails
          </div>
          <div style={{ fontSize:13, color:'var(--peach-1000)', fontWeight:600 }}>
            Avoid teasing future rate changes. Cap disclosure required on paid channels. Rate/cap/exclusions mandatory.
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{ maxWidth:1680, margin:'16px auto 0', textAlign:'center', color:'var(--n400)', fontSize:11 }}>
        Cashback — X / Plus cards — Q2-Q3 2026 &middot; PMM team &middot; DE, ES, NL &middot;
        Data sourced from Notion &middot; Hover touchpoints for objectives &amp; key messages
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
